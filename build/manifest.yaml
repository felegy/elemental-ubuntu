iso:
  bootloader-in-rootfs: true
  grub-entry-name: "Ubuntu Installer"

squash-no-compression: true

disk:
  size: 32768
  partitions:
    oem:
      size: 32
    state:
      size: 8192
    recovery:
      size: 2048
    persistent:
      size: 0
      fs: xfs
  expandable: true
  recovery-system:
    fs: squashfs
  type: raw
