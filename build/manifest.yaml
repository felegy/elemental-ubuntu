iso:
  bootloader-in-rootfs: true
  grub-entry-name: "Ubuntu Installer"

squash-no-compression: true

disk:
  size: 32768
  partitions:
    efi:
      size: 128
    oem:
      size: 64
    state:
      size: 8192
    recovery:
      size: 4096
    persistent:
      size: 0
      fs: xfs
  expandable: true
  type: raw
